on:
    workflow_dispatch:
    pull_request:
      paths:
        - '**.rs'
        - .github/workflows/CI.yml
        - Cargo.lock
        - Cargo.toml
        - '**/Cargo.toml'
        - rust-toolchain.toml

permissions: read-all
name: Rust CI
jobs:
    run-tests:
      name: Run tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable
        - uses: taiki-e/install-action@nextest

        - name: cargo nextest
          shell: bash
          run: |
            cargo nextest run
          env:
            RUST_BACKTRACE: 1
  
    cargo-fmt:
        name: Check code is formatted
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install Rust
            uses: dtolnay/rust-toolchain@stable
            with:
                components: rustfmt
  
          - name: cargo fmt
            run: cargo fmt --check

